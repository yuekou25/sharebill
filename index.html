<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Bill Pro - Tính Nợ Thông Minh</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        input[type="text"], input[type="number"], select { width: calc(100% - 24px); padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-blue { background-color: #2980b9; }
        .btn-red { background-color: #e74c3c; margin-top: 5px; }
        .list-box { background: #f9f9f9; padding: 10px; border-radius: 6px; min-height: 50px; margin-bottom: 15px; }
        .list-item { background: #fff; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 15px; }
        
        .involved-list { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
        .involved-row { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 8px 12px; border: 1px solid #eee; border-radius: 6px; }
        .involved-row input[type="number"] { width: 60px; margin: 0; padding: 5px; text-align: center; }
        .involved-row input[type="text"] { width: 110px; margin: 0; padding: 5px; text-align: right; }
        
        .result-item { background: #d4edda; color: #155724; padding: 12px; margin-bottom: 8px; border-radius: 6px; font-weight: bold; border-left: 5px solid #28a745; }
        .btn-copy { background-color: #8e44ad; }
    </style>
</head>
<body>

<div class="container">
    <h1>💸 Share Bill Pro</h1>

    <div class="section">
        <h2>1. Nhóm của bạn</h2>
        <input type="text" id="personName" placeholder="Tên thành viên mới...">
        <button class="btn-blue" onclick="addPerson()">+ Thêm Người</button>
        <div id="peopleList" class="list-box"></div>
        <button class="btn-red" onclick="clearAllData()">🗑 Xóa làm lại từ đầu</button>
    </div>

    <div class="section">
        <h2>2. Thêm chi phí</h2>
        <input type="text" id="billDesc" placeholder="Tên khoản chi (VD: Cơm trưa, Lẩu...)">
        
        <label><b>Ai đã trả tiền?</b></label>
        <select id="payerSelect"></select>

        <label style="display:block; margin-top: 10px;"><b>Cách chia tiền:</b></label>
        <select id="splitMode" onchange="updateUI()" style="background-color: #e8f4f8; font-weight: bold; border-color: #3498db;">
            <option value="ratio">🔄 Chia đều hoặc Theo suất</option>
            <option value="exact">🎯 Nhập chính xác tiền từng người</option>
        </select>

        <div id="amountContainer">
            <input type="text" id="billAmount" placeholder="Nhập Tổng tiền bill (VND)" oninput="formatCurrency(this)">
        </div>

        <label style="display:block; margin-top: 10px;"><b>Chi tiết cho từng người:</b></label>
        <div id="involvedRows" class="involved-list"></div>

        <button class="btn-blue" onclick="addExpense()">+ Thêm Khoản Chi</button>
        <div id="expensesList" class="list-box"></div>
    </div>

    <div class="section">
        <button onclick="calculateDebts()">🧮 TÍNH TOÁN PHƯƠNG ÁN TỐI ƯU</button>
        <div id="resultBox" style="margin-top: 20px;"></div>
        <button id="btnCopy" class="btn-copy" style="display: none;" onclick="copyResultToClipboard()">📋 Sao chép kết quả</button>
    </div>
</div>

<script>
    let people = JSON.parse(localStorage.getItem('sharebill_people')) || [];
    let expenses = JSON.parse(localStorage.getItem('sharebill_expenses')) || [];

    window.onload = () => updateUI();

    function saveData() {
        localStorage.setItem('sharebill_people', JSON.stringify(people));
        localStorage.setItem('sharebill_expenses', JSON.stringify(expenses));
    }

    function clearAllData() {
        if(confirm("Bạn có chắc chắn muốn xóa hết danh sách người và các khoản chi không?")) {
            localStorage.clear();
            people = [];
            expenses = [];
            updateUI();
            document.getElementById('resultBox').innerHTML = '';
            document.getElementById('btnCopy').style.display = 'none';
        }
    }

    function formatCurrency(input) {
        let value = input.value.replace(/\D/g, '');
        input.value = value ? parseInt(value).toLocaleString('vi-VN') : '';
    }

    function addPerson() {
        let name = document.getElementById('personName').value.trim();
        if (name && !people.includes(name)) {
            people.push(name);
            document.getElementById('personName').value = '';
            saveData();
            updateUI();
        }
    }

    function addExpense() {
        let desc = document.getElementById('billDesc').value.trim();
        let payer = document.getElementById('payerSelect').value;
        let mode = document.getElementById('splitMode').value;
        let amount = 0;
        let involved = [];

        if (mode === 'exact') {
            // Chế độ nhập tiền chính xác: Tự cộng dồn tổng tiền
            document.querySelectorAll('.involved-row').forEach(row => {
                let cb = row.querySelector('.involve-cb');
                let exactInput = row.querySelector('.exact-input').value.replace(/\D/g, '');
                let money = parseFloat(exactInput) || 0;
                if (cb.checked && money > 0) {
                    involved.push({ name: cb.value, amountOwed: money });
                    amount += money;
                }
            });
            if (amount === 0) {
                alert("Vui lòng nhập số tiền hợp lệ cho ít nhất 1 người!");
                return;
            }
        } else {
            // Chế độ chia theo suất: Lấy tổng tiền từ ô nhập
            let amountStr = document.getElementById('billAmount').value.replace(/\D/g, '');
            amount = parseFloat(amountStr);
            if (!amount || amount <= 0) {
                alert("Vui lòng nhập tổng tiền hợp lệ!");
                return;
            }
            document.querySelectorAll('.involved-row').forEach(row => {
                let cb = row.querySelector('.involve-cb');
                let weight = parseFloat(row.querySelector('.weight-input').value) || 0;
                if (cb.checked && weight > 0) {
                    involved.push({ name: cb.value, weight: weight });
                }
            });
        }

        if (!desc || !payer || involved.length === 0) {
            alert("Vui lòng nhập đủ thông tin và chọn ít nhất 1 người tham gia!");
            return;
        }

        expenses.push({ desc, amount, payer, involved, mode });
        
        // Reset form
        document.getElementById('billDesc').value = '';
        if(document.getElementById('billAmount')) document.getElementById('billAmount').value = '';
        
        // Reset các ô nhập tiền chi tiết
        document.querySelectorAll('.exact-input').forEach(input => input.value = '');
        
        saveData();
        updateUI();
    }

    function updateUI() {
        // Cập nhật danh sách người
        document.getElementById('peopleList').innerHTML = people.map(p => `<span class="list-item" style="display:inline-block; margin-right:5px;">👤 ${p}</span>`).join('');
        
        // Cập nhật Dropdown người trả
        let payerSelect = document.getElementById('payerSelect');
        let currentPayer = payerSelect.value;
        payerSelect.innerHTML = '<option value="">-- Chọn người trả --</option>' + people.map(p => `<option value="${p}">${p}</option>`).join('');
        if (people.includes(currentPayer)) payerSelect.value = currentPayer;

        // Xử lý giao diện Cách chia tiền
        let mode = document.getElementById('splitMode') ? document.getElementById('splitMode').value : 'ratio';
        let amountContainer = document.getElementById('amountContainer');

        if (mode === 'exact') {
            amountContainer.style.display = 'none'; // Ẩn ô nhập tổng tiền
            document.getElementById('involvedRows').innerHTML = people.map(p => `
                <div class="involved-row">
                    <label><input type="checkbox" class="involve-cb" value="${p}" checked> ${p}</label>
                    <div>Tiền (VNĐ): <input type="text" class="exact-input" placeholder="VD: 30000" oninput="formatCurrency(this)"></div>
                </div>
            `).join('');
        } else {
            amountContainer.style.display = 'block'; // Hiện ô nhập tổng tiền
            document.getElementById('involvedRows').innerHTML = people.map(p => `
                <div class="involved-row">
                    <label><input type="checkbox" class="involve-cb" value="${p}" checked> ${p}</label>
                    <div>Số suất: <input type="number" class="weight-input" value="1" min="0.1" step="0.1"></div>
                </div>
            `).join('');
        }

        // Cập nhật danh sách khoản chi (Hiển thị rõ người trả tiền)
        document.getElementById('expensesList').innerHTML = expenses.map((e, idx) => `
            <div class="list-item">
                🧾 <b>${e.desc}</b>: ${e.amount.toLocaleString('vi-VN')}đ <br>
                <span style="color:#555; font-size: 0.9em;">
                    👉 <b>${e.payer}</b> đã trả ${e.mode === 'exact' ? '(Tính riêng từng người)' : '(Chia chung)'}
                </span>
            </div>
        `).join('');
    }

    let finalResultText = "";

    function calculateDebts() {
        if (expenses.length === 0) return;
        let balances = {};
        people.forEach(p => balances[p] = 0);

        expenses.forEach(exp => {
            // Cộng tiền cho người trả
            balances[exp.payer] += exp.amount;
            
            // Trừ tiền người nợ tùy theo chế độ
            if (exp.mode === 'exact') {
                exp.involved.forEach(item => {
                    balances[item.name] -= item.amountOwed;
                });
            } else {
                let totalWeights = exp.involved.reduce((sum, item) => sum + item.weight, 0);
                let pricePerWeight = exp.amount / totalWeights;
                exp.involved.forEach(item => {
                    balances[item.name] -= pricePerWeight * item.weight;
                });
            }
        });

        // Phân loại chủ nợ và con nợ
        let debtors = [], creditors = [];
        for (let p in balances) {
            let bal = Math.round(balances[p]);
            if (bal < 0) debtors.push({ name: p, amount: -bal });
            else if (bal > 0) creditors.push({ name: p, amount: bal });
        }

        // Sắp xếp ưu tiên trả khoản lớn trước
        debtors.sort((a, b) => b.amount - a.amount);
        creditors.sort((a, b) => b.amount - a.amount);

        let results = [];
        finalResultText = "💸 TỔNG KẾT CHI PHÍ\n------------------\n";
        
        // Thuật toán bù trừ nợ (Greedy)
        let i = 0, j = 0;
        while (i < debtors.length && j < creditors.length) {
            let d = debtors[i], c = creditors[j];
            let settle = Math.min(d.amount, c.amount);
            
            let line = `👉 ${d.name} chuyển cho ${c.name}: ${settle.toLocaleString('vi-VN')}đ`;
            results.push(`<div class="result-item">${line}</div>`);
            finalResultText += line + "\n";
            
            d.amount -= settle; 
            c.amount -= settle;
            
            if (d.amount === 0) i++; 
            if (c.amount === 0) j++;
        }

        document.getElementById('resultBox').innerHTML = results.length ? results.join('') : "🎉 Tuyệt vời! Đã bù trừ xong, không ai nợ ai đồng nào!";
        document.getElementById('btnCopy').style.display = results.length ? 'block' : 'none';
    }

    function copyResultToClipboard() {
        navigator.clipboard.writeText(finalResultText).then(() => {
            alert("Đã copy kết quả thành công! Bạn có thể dán vào tin nhắn để gửi cho nhóm.");
        }).catch(err => {
            alert("Lỗi sao chép, vui lòng copy thủ công trên màn hình.");
        });
    }
</script>

</body>
</html>
